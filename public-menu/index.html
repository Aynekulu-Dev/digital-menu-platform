<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Digital Menu</title>
  <meta name="description" content="Scan-to-view restaurant menu" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <div class="loading">Loading menu…</div>
  </div>
  <!-- No build step, no framework: fetches app-config.js's API_BASE_URL, then
       calls the same GET /api/v1/public/menu/{slug}/ endpoint the React
       admin dashboard's PublicMenu.jsx also uses. Kept intentionally tiny
       so it loads instantly on weak restaurant wifi / cellular. -->
  <script src="./app-config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
